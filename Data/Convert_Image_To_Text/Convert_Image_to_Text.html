<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Professional OCR</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<style type="text/css">
	.mb-3 {
		 font-family: 'Segoe UI', 'Khmer OS', Arial, sans-serif;
	}
	.back{
		font-size: 20px;
		text-decoration: none;
	    font-family: 'Segoe UI', 'Khmer OS', Arial, sans-serif;
	    text-align: right;
	}
	.back :hover{
		color: #f57ca7;
	}
</style>
</head>
<body class="bg-light">
<div class="container py-4">
<h2 class="mb-3">បំលែងរូបភាពទៅជាអក្សរ (English + Khmer)</h2>
<h1 class="back"><a href="../../battambang-planning-dashboard.html" class="back"> ត្រឡប់ទៅទំព័រដើម</a></h1>

<div class="card p-3">
<input class="form-control" type="file" id="imageInput" accept="image/*">

<div class="mt-3 text-center">
<img id="preview" style="max-width:100%;max-height:400px;">
</div>

<div class="row mt-3">
<div class="col-md-4">
<select id="lang" class="form-select">
<option value="eng">English</option>
<option value="khm">Khmer</option>
<option value="eng+khm">English + Khmer</option>
</select>
</div>
<div class="col-md-8">
<button class="btn btn-primary" onclick="extractText()">Convert OCR</button>
<button class="btn btn-success" onclick="downloadText()">TXT</button>
<button class="btn btn-secondary" onclick="copyText()">Copy</button>
</div>
</div>

<div class="progress mt-3">
<div id="bar" class="progress-bar" style="width:0%">0%</div>
</div>

<div id="status" class="mt-2"></div>

<textarea id="result" class="form-control mt-3" rows="12"></textarea>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
