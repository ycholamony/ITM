<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>មន្ទីរផែនការខេត្តបាត់ដំបង — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700;900&family=Noto+Sans+Khmer:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --deep: #0b1740;
    --royal: #123a8e;
    --royal-bright: #2a5cd6;
    --gold: #c9a227;
    --gold-light: #e8cf7a;
    --cream: #f7f4ea;
    --ink: #1a1f36;
    --white: #ffffff;
    --line: rgba(11,23,64,0.12);
    --shadow: 0 10px 30px rgba(11,23,64,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans Khmer','Inter',sans-serif;
    position:relative;
    overflow-x:hidden;
    min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ---------- watermark ---------- */
  .watermark{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    opacity:0.05;
  }
  .watermark svg{ width:120vmin; height:120vmin; }

  /* ---------- header ---------- */
  .site-header{
    position:relative; z-index:1;
    background:linear-gradient(180deg, var(--deep) 0%, var(--royal) 100%);
    color:var(--white);
    padding:10px 20px 0;
    text-align:center;
    overflow:hidden;
  }
  .site-header::before{
    content:"";
    position:absolute; top:-40%; left:50%; transform:translateX(-50%);
    width:900px; height:900px;
    background:radial-gradient(circle, rgba(201,162,39,0.18) 0%, rgba(201,162,39,0) 70%);
    pointer-events:none;
  }
  .logo-wrap{
    position:relative; z-index:2;
    width:132px; height:132px; margin:0 auto 18px;
    border-radius:50%;
    background:var(--white);
    border:3px solid var(--gold);
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    animation:fadeDown 0.7s ease both;
  }
  .logo-wrap img{ width:100%; height:100%; object-fit:cover; }
  .site-header h1{
    position:relative; z-index:2;
    font-family:'Battambang','Noto Sans Khmer',serif;
    font-weight:900;
    font-size:30px;
    margin:0 0 6px;
    color:var(--gold-light);
    letter-spacing:0.5px;
    animation:fadeDown 0.8s ease both;
  }
  .site-header .subtitle{
    position:relative; z-index:2;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:clamp(11px, 1.6vw, 13.5px);
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.78);
    margin:0 0 28px;
    animation:fadeDown 0.9s ease both;
  }
  @keyframes fadeDown{ from{opacity:0; transform:translateY(-12px);} to{opacity:1; transform:translateY(0);} }

  .motif{
    position:relative; z-index:2;
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding-bottom:22px;
  }
  .motif .rule{ height:1px; flex:1; max-width:140px; background:linear-gradient(90deg, transparent, var(--gold), transparent); }
  .motif svg{ flex:none; }

  /* ---------- main / grid ---------- */
  main{ position:relative; z-index:1; max-width:1140px; margin:0 auto; padding:46px 20px 30px; }
  .section-label{
  font-family: 'Battambang', 'Noto Sans Khmer', serif; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    font-size:12.5px; color:var(--royal); margin:0 0 4px;
  }
  .section-title{
    font-family:'Battambang','Noto Sans Khmer',serif; font-weight:700;
    font-size:clamp(20px,2.6vw,26px); color:var(--deep); margin:0 0 26px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:18px;
  }
  .tool-card{
    background:var(--white);
    border:1px solid var(--line);
    border-left:4px solid var(--gold);
    border-radius:10px;
    padding:22px 20px;
    text-align:left;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    display:flex; flex-direction:column; gap:12px;
    font-family:inherit;
    text-decoration: none;
  }
  .tool-card:hover, .tool-card:focus-visible{
    transform:translateY(-4px);
    box-shadow:0 16px 34px rgba(11,23,64,0.16);
    border-left-color:var(--royal-bright);
    outline:none;
  }
  .tool-card:focus-visible{ outline:2px solid var(--royal-bright); outline-offset:3px; }
  .tool-icon{
    width:42px; height:42px; border-radius:9px;
    background:linear-gradient(135deg, var(--royal) 0%, var(--deep) 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .tool-icon svg{ width:22px; height:22px; stroke:var(--gold-light); }
  .tool-name-km{ font-weight:700; font-size:16px; color:var(--deep); line-height:1.4; }
  .tool-name-en{ font-family:'Inter',sans-serif; font-weight:500; font-size:12px; color:#5b6274; letter-spacing:0.3px; }

  /* ---------- tool panel ---------- */
  .tool-panel{
    margin-top:34px;
    background:var(--white);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:0;
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height 0.45s ease, opacity 0.3s ease;
  }
  .tool-panel.open{
    max-height:none;
    opacity:1;
    padding:8px 0 4px;
  }
  .panel-inner{ padding:26px 28px 32px; }
  .panel-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:20px; }
  .panel-head h2{ font-family:'Battambang','Noto Sans Khmer',serif; font-size:21px; color:var(--deep); margin:0 0 4px; }
  .panel-head p{ font-family:'Inter',sans-serif; font-size:12.5px; color:#6b7186; margin:0; }
  .close-btn{
    background:var(--cream); border:1px solid var(--line); color:var(--deep);
    width:34px; height:34px; border-radius:50%; font-size:18px; cursor:pointer; flex:none;
    transition:background 0.2s ease;
  }
  .close-btn:hover{ background:#eee7d2; }

  .field-row{ display:flex; flex-wrap:wrap; gap:12px; margin-bottom:14px; align-items:center; }
  label{ font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:var(--ink); }
  input[type="file"], input[type="text"], input[type="number"], textarea, select{
    font-family:'Inter','Noto Sans Khmer',sans-serif;
    border:1px solid #d8d4c4; border-radius:8px; padding:9px 12px; font-size:13.5px;
    background:#fcfbf7; color:var(--ink);
  }
  textarea{ width:100%; min-height:130px; resize:vertical; font-size:14px; }
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    background:var(--royal); color:var(--white); border:none; border-radius:8px;
    padding:10px 18px; cursor:pointer; transition:background 0.2s ease, transform 0.15s ease;
  }
  .btn:hover{ background:var(--royal-bright); }
  .btn:active{ transform:scale(0.97); }
  .btn.gold{ background:var(--gold); color:var(--deep); }
  .btn.gold:hover{ background:var(--gold-light); }
  .btn.ghost{ background:transparent; color:var(--royal); border:1px solid var(--royal); }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .status{ font-family:'JetBrains Mono',monospace; font-size:12px; color:#6b7186; margin-top:10px; min-height:16px; }
  .status.err{ color:#b3261e; }
  .status.ok{ color:#1b7f4d; }

  table.sc-table{ border-collapse:collapse; width:100%; margin-top:16px; font-size:13px; }
  table.sc-table th, table.sc-table td{ border:1px solid #d8d4c4; padding:8px 10px; text-align:center; }
  table.sc-table th{ background:var(--deep); color:var(--white); font-family:'Inter',sans-serif; }
  table.sc-table input{ width:64px; text-align:center; padding:6px; }
  table.sc-table td:first-child, table.sc-table th:first-child{ text-align:left; min-width:140px; }

  .preview-box{ border:1px dashed #d8d4c4; border-radius:10px; padding:16px; background:#fcfbf7; margin-top:14px; max-height:260px; overflow:auto; font-family:'Inter',sans-serif; font-size:13px; }
  .preview-box table{ border-collapse:collapse; width:100%; }
  .preview-box td, .preview-box th{ border:1px solid #ddd; padding:4px 8px; font-size:12px; }

  .progress-bar{ width:100%; height:8px; background:#e6e2d3; border-radius:6px; overflow:hidden; margin-top:12px; display:none; }
  .progress-bar > div{ height:100%; width:0%; background:var(--gold); transition:width 0.2s ease; }

  /* ---------- footer ---------- */
  footer{
    position:relative; z-index:1;
    background:var(--deep); color:rgba(255,255,255,0.85);
    text-align:center; padding:30px 20px 26px; margin-top:50px;
  }
  footer .divider{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:18px; }
  footer .divider .rule{ height:1px; width:80px; background:linear-gradient(90deg, transparent, var(--gold), transparent); }
  footer p{ margin:4px 0; }
  footer .km{ font-family:'Noto Sans Khmer',sans-serif; font-weight:600; font-size:14.5px; color:var(--gold-light); }
  footer .en{ font-family:'Inter',sans-serif; font-size:11.5px; letter-spacing:0.5px; color:rgba(255,255,255,0.55); }

  @media (max-width:560px){
    .logo-wrap{ width:104px; height:104px; }
    .panel-inner{ padding:20px 16px 26px; }
  }

</style>
</head>

<script>
(function(){

    }

  var grid = document.getElementById('toolGrid');
  var panel = document.getElementById('toolPanel');
  var panelBody = document.getElementById('panelBody');

  var panelTitleEn = document.getElementById('panelTitleEn');

  grid.addEventListener('click', function(e){

    if(!card) return;

  function openTool(id){
    var tool = TOOLS[id];
    if(!tool) return;
    panelTitleKm.textContent = tool.km;
    panelTitleEn.textContent = tool.en;
    panelBody.innerHTML = tool.body();
    panel.classList.add('open');
    if(tool.init) tool.init();
    setTimeout(function(){

  var TOOL_INIT = {};

  /* ================= helpers ================= */
  function downloadBlob(blob, filename){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
  }

  function wordHtmlShell(bodyHtml, title){
    return '<html xmlns:o="urn:schemas-microsoft-com:office:office" '+
      'xmlns:w="urn:schemas-microsoft-com:office:word" '+
      'xmlns="http://www.w3.org/TR/REC-html40">'+
      '<head><meta charset="utf-8"><title>'+(title||'Document')+'</title>'+
      '<style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;} '+
      'table{border-collapse:collapse;width:100%;} td,th{border:1px solid #999;padding:4px 8px;}</style>'+
      '</head><body>'+bodyHtml+'</body></html>';
  }

  function setStatus(el, msg, type){
    el.textContent = msg;
    el.className = 'status' + (type ? (' '+type) : '');
  }

  /* ================= 1. PDF Converter ================= */
  function tplPdfConverter(){
    return ''+
    '<div class="field-row"><label>រូបភាព (Images):</label></div>'+
    '<div class="field-row"><input type="file" id="pdfImages" accept="image/*" multiple></div>'+
    '<div class="field-row"><label>អត្ថបទ (Optional text page):</label></div>'+
    '<textarea id="pdfText" placeholder="វាយអត្ថបទនៅទីនេះ ដើម្បីបញ្ចូលជាទំព័រអត្ថបទ (Optional)"></textarea>'+
    '<div class="field-row" style="margin-top:14px;">'+
      '<button class="btn gold" id="pdfConvertBtn">បម្លែងទៅ PDF / Convert</button>'+
    '</div>'+
    '<div class="status" id="pdfStatus"></div>';
  }
  TOOL_INIT["pdf-converter"] = function(){
    var btn = document.getElementById('pdfConvertBtn');
    var status = document.getElementById('pdfStatus');
    btn.addEventListener('click', function(){
      var files = document.getElementById('pdfImages').files;
      var text = document.getElementById('pdfText').value.trim();
      if(!files.length && !text){
        setStatus(status, 'សូមបញ្ចូលរូបភាព ឬអត្ថបទ / Please add an image or text.', 'err');
        return;
      }
      setStatus(status, 'កំពុងបម្លែង... / Converting...');
      var jsPDFCtor = window.jspdf ? window.jspdf.jsPDF : null;
      if(!jsPDFCtor){ setStatus(status,'PDF library not available.','err'); return; }
      var doc = new jsPDFCtor({unit:'pt', format:'a4'});
      var pageW = doc.internal.pageSize.getWidth();
      var pageH = doc.internal.pageSize.getHeight();
      var pending = files.length;
      var firstPage = true;

      function addTextPage(){
        if(!text) return;
        if(!firstPage) doc.addPage();
        firstPage = false;
        var lines = doc.splitTextToSize(text, pageW - 80);
        doc.setFontSize(12);
        doc.text(lines, 40, 60);
      }

      function finish(){
        addTextPage();
        doc.save('converted.pdf');
        setStatus(status, 'ជោគជ័យ! ឯកសារត្រូវបានទាញយក / Done — file downloaded.', 'ok');
      }

      if(files.length === 0){ finish(); return; }

      var imgs = new Array(files.length);
      var loaded = 0;
      Array.prototype.forEach.call(files, function(file, idx){
        var reader = new FileReader();
        reader.onload = function(ev){
          var img = new Image();
          img.onload = function(){
            imgs[idx] = {data: ev.target.result, w: img.width, h: img.height};
            loaded++;
            if(loaded === files.length){
              imgs.forEach(function(im, i){
                if(i>0) doc.addPage();
                var ratio = Math.min((pageW-40)/im.w, (pageH-40)/im.h);
                var w = im.w*ratio, h = im.h*ratio;
                var x = (pageW-w)/2, y = (pageH-h)/2;
                var fmt = im.data.substring(11, im.data.indexOf(';')).toUpperCase();
                doc.addImage(im.data, fmt.indexOf('PNG')>-1?'PNG':'JPEG', x, y, w, h);
              });
              finish();
            }
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    });
  };

  /* ================= 2. Excel To Word ================= */
  function tplExcelToWord(){
    return ''+
    '<div class="field-row"><input type="file" id="e2wFile" accept=".xlsx,.xls,.csv"></div>'+
    '<div class="field-row"><button class="btn gold" id="e2wBtn">បម្លែងទៅ Word / Convert</button></div>'+
    '<div class="status" id="e2wStatus"></div>'+
    '<div class="preview-box" id="e2wPreview" style="display:none;"></div>';
  }
  TOOL_INIT["excel-to-word"] = function(){
    var btn = document.getElementById('e2wBtn');
    var status = document.getElementById('e2wStatus');
    var preview = document.getElementById('e2wPreview');
    btn.addEventListener('click', function(){
      var file = document.getElementById('e2wFile').files[0];
      if(!file){ setStatus(status,'សូមជ្រើសរើសឯកសារ Excel / Please choose a file.','err'); return; }
      setStatus(status,'កំពុងដំណើរការ... / Processing...');
      var reader = new FileReader();
      reader.onload = function(e){
        try{
          var data = new Uint8Array(e.target.result);
          var wb = XLSX.read(data, {type:'array'});
          var sheetName = wb.SheetNames[0];
          var sheet = wb.Sheets[sheetName];
          var html = XLSX.utils.sheet_to_html(sheet);
          preview.innerHTML = html;
          preview.style.display = 'block';
          var fullHtml = wordHtmlShell('<h2>'+sheetName+'</h2>'+html, sheetName);
          var blob = new Blob(['\ufeff', fullHtml], {type:'application/msword'});
          downloadBlob(blob, (file.name.replace(/\.[^.]+$/, '') || 'converted') + '.doc');
          setStatus(status,'ជោគជ័យ! ឯកសារ Word ត្រូវបានទាញយក / Done — Word file downloaded.','ok');
        }catch(err){
          setStatus(status,'កំហុស៖ '+err.message,'err');
        }
      };
      reader.readAsArrayBuffer(file);
    });
  };

  /* ================= 3. Word To Excel ================= */
  function tplWordToExcel(){
    return ''+
    '<div class="field-row"><input type="file" id="w2eFile" accept=".docx"></div>'+
    '<div class="field-row"><button class="btn gold" id="w2eBtn">បម្លែងទៅ Excel / Convert</button></div>'+
    '<div class="status" id="w2eStatus"></div>'+
    '<div class="preview-box" id="w2ePreview" style="display:none;"></div>';
  }
  TOOL_INIT["word-to-excel"] = function(){
    var btn = document.getElementById('w2eBtn');
    var status = document.getElementById('w2eStatus');
    var preview = document.getElementById('w2ePreview');
    btn.addEventListener('click', function(){
      var file = document.getElementById('w2eFile').files[0];
      if(!file){ setStatus(status,'សូមជ្រើសរើសឯកសារ Word / Please choose a .docx file.','err'); return; }
      setStatus(status,'កំពុងដំណើរការ... / Processing...');
      var reader = new FileReader();
      reader.onload = function(e){
        mammoth.convertToHtml({arrayBuffer: e.target.result}).then(function(result){
          var html = result.value;
          var container = document.createElement('div');
          container.innerHTML = html;
          preview.innerHTML = html;
          preview.style.display = 'block';

          var wb = XLSX.utils.book_new();
          var tables = container.querySelectorAll('table');
          if(tables.length){
            tables.forEach(function(table, i){
              var aoa = [];
              table.querySelectorAll('tr').forEach(function(tr){
                var row = [];
                tr.querySelectorAll('td,th').forEach(function(cell){ row.push(cell.textContent.trim()); });
                aoa.push(row);
              });
              var ws = XLSX.utils.aoa_to_sheet(aoa);
              XLSX.utils.book_append_sheet(wb, ws, 'Table'+(i+1));
            });
          } else {
            var text = container.textContent.split('\n').filter(function(l){return l.trim();});
            var aoa = text.map(function(l){ return [l.trim()]; });
            if(!aoa.length) aoa = [['']];
            var ws2 = XLSX.utils.aoa_to_sheet(aoa);
            XLSX.utils.book_append_sheet(wb, ws2, 'Content');
          }
          XLSX.writeFile(wb, (file.name.replace(/\.[^.]+$/, '') || 'converted') + '.xlsx');
          setStatus(status,'ជោគជ័យ! ឯកសារ Excel ត្រូវបានទាញយក / Done — Excel file downloaded.','ok');
        }).catch(function(err){
          setStatus(status,'កំហុស៖ '+err.message,'err');
        });
      };
      reader.readAsArrayBuffer(file);
    });
  };

  /* ================= 4. Word Document Merger ================= */
  function tplWordMerger(){
    return ''+
    '<div class="field-row"><input type="file" id="mergeFiles" accept=".docx" multiple></div>'+
    '<div class="field-row"><button class="btn gold" id="mergeBtn">បញ្ចូលចូលគ្នា / Merge</button></div>'+
    '<div class="status" id="mergeStatus"></div>'+
    '<div class="preview-box" id="mergePreview" style="display:none;"></div>';
  }
  TOOL_INIT["word-merger"] = function(){
    var btn = document.getElementById('mergeBtn');
    var status = document.getElementById('mergeStatus');
    var preview = document.getElementById('mergePreview');
    btn.addEventListener('click', function(){
      var files = document.getElementById('mergeFiles').files;
      if(files.length < 2){ setStatus(status,'សូមជ្រើសរើសយ៉ាងតិច ២ ឯកសារ / Please choose at least 2 files.','err'); return; }
      setStatus(status,'កំពុងបញ្ចូលចូលគ្នា... / Merging...');
      var results = new Array(files.length);
      var done = 0;
      Array.prototype.forEach.call(files, function(file, idx){
        var reader = new FileReader();
        reader.onload = function(e){
          mammoth.convertToHtml({arrayBuffer: e.target.result}).then(function(result){
            results[idx] = '<div>'+result.value+'</div><div style="page-break-after:always; border-top:1px dashed #999; margin:24px 0;"></div>';
            done++;
            if(done === files.length){
              var merged = results.join('');
              preview.innerHTML = merged;
              preview.style.display = 'block';
              var fullHtml = wordHtmlShell(merged, 'Merged Document');
              var blob = new Blob(['\ufeff', fullHtml], {type:'application/msword'});
              downloadBlob(blob, 'merged-document.doc');
              setStatus(status,'ជោគជ័យ! ឯកសារបានបញ្ចូលចូលគ្នា / Done — merged file downloaded.','ok');
            }
          }).catch(function(err){ setStatus(status,'កំហុស៖ '+err.message,'err'); });
        };
        reader.readAsArrayBuffer(file);
      });
    });
  };

  /* ================= 5. Convert Image To Text (OCR) ================= */
  function tplImageToText(){
    return ''+
    '<div class="field-row"><input type="file" id="ocrImage" accept="image/*"></div>'+
    '<div class="field-row"><button class="btn gold" id="ocrBtn">ស្រង់អក្សរ / Extract Text</button></div>'+
    '<div class="progress-bar" id="ocrProgress"><div></div></div>'+
    '<div class="status" id="ocrStatus"></div>'+
    '<textarea id="ocrResult" placeholder="លទ្ធផលអត្ថបទនឹងបង្ហាញនៅទីនេះ / Extracted text will appear here" style="margin-top:12px;"></textarea>'+
    '<div class="field-row" style="margin-top:10px;">'+
      '<button class="btn ghost" id="ocrCopyBtn">ចម្លង / Copy</button>'+
      '<button class="btn ghost" id="ocrDownloadBtn">ទាញយក .txt / Download</button>'+
    '</div>';
  }
  TOOL_INIT["image-to-text"] = function(){
    var btn = document.getElementById('ocrBtn');
    var status = document.getElementById('ocrStatus');
    var progress = document.getElementById('ocrProgress');
    var progressBar = progress.querySelector('div');
    var resultBox = document.getElementById('ocrResult');

    btn.addEventListener('click', function(){
      var file = document.getElementById('ocrImage').files[0];
      if(!file){ setStatus(status,'សូមជ្រើសរើសរូបភាព / Please choose an image.','err'); return; }
      setStatus(status,'កំពុងស្រង់អក្សរ... / Recognizing text...');
      progress.style.display='block'; progressBar.style.width='0%';
      Tesseract.recognize(file, 'eng', {
        logger: function(m){
          if(m.status === 'recognizing text'){
            progressBar.style.width = Math.round(m.progress*100)+'%';
          }
        }
      }).then(function(result){
        resultBox.value = result.data.text;
        setStatus(status,'ជោគជ័យ! / Done.','ok');
      }).catch(function(err){
        setStatus(status,'កំហុស៖ '+err.message,'err');
      });
    });

    document.getElementById('ocrCopyBtn').addEventListener('click', function(){
      resultBox.select();
      document.execCommand('copy');
      setStatus(status,'បានចម្លង! / Copied to clipboard.','ok');
    });
    document.getElementById('ocrDownloadBtn').addEventListener('click', function(){
      var blob = new Blob([resultBox.value], {type:'text/plain'});
      downloadBlob(blob, 'extracted-text.txt');
    });
  };

  /* ================= 6. Make Score Card ================= */
  function tplScoreCard(){
    return ''+
    '<div class="field-row">'+
      '<label>លក្ខណវិនិច្ឆ័យ (Criteria):</label><input type="text" id="scCriteriaName" placeholder="ឈ្មោះលក្ខណវិនិច្ឆ័យ">'+
      '<label>ពិន្ទុអតិបរមា (Max):</label><input type="number" id="scCriteriaMax" value="10" style="width:70px;">'+
      '<button class="btn ghost" id="scAddCriteria">+ បន្ថែម Criteria</button>'+
    '</div>'+
    '<div class="field-row">'+
      '<label>អ្នកចូលរួម (Participant):</label><input type="text" id="scParticipantName" placeholder="ឈ្មោះអ្នកចូលរួម">'+
      '<button class="btn ghost" id="scAddParticipant">+ បន្ថែម Participant</button>'+
    '</div>'+
    '<div id="scTableWrap"></div>'+
    '<div class="field-row" style="margin-top:16px;">'+
      '<button class="btn gold" id="scExportPdf">ទាញយក PDF / Export PDF</button>'+
    '</div>'+
    '<div class="status" id="scStatus"></div>';
  }
  TOOL_INIT["score-card"] = function(){
    var criteria = []; // {name, max}
    var participants = []; // name
    var scores = {}; // key `${ci}-${pi}` -> value

    var wrap = document.getElementById('scTableWrap');
    var status = document.getElementById('scStatus');

    function render(){
      if(!criteria.length || !participants.length){
        wrap.innerHTML = '<p style="color:#8a8f9e; font-size:13px; margin-top:14px;">បន្ថែម Criteria និង Participant ដើម្បីបង្កើតតារាង / Add criteria and participants to build the table.</p>';
        return;
      }
      var html = '<table class="sc-table"><thead><tr><th>លក្ខណវិនិច្ឆ័យ / Criteria</th>';
      participants.forEach(function(p){ html += '<th>'+p+'</th>'; });
      html += '</tr></thead><tbody>';
      criteria.forEach(function(c, ci){
        html += '<tr><td>'+c.name+' (/'+c.max+')</td>';
        participants.forEach(function(p, pi){
          var key = ci+'-'+pi;
          var val = scores[key] !== undefined ? scores[key] : '';
          html += '<td><input type="number" min="0" max="'+c.max+'" data-key="'+key+'" value="'+val+'"></td>';
        });
        html += '</tr>';
      });
      html += '<tr><td><strong>សរុប / Total</strong></td>';
      participants.forEach(function(p, pi){
        var total = 0;
        criteria.forEach(function(c, ci){ total += Number(scores[ci+'-'+pi]) || 0; });
        html += '<td><strong>'+total+'</strong></td>';
      });
      html += '</tr></tbody></table>';
      wrap.innerHTML = html;
      wrap.querySelectorAll('input[data-key]').forEach(function(inp){
        inp.addEventListener('input', function(){
          scores[inp.getAttribute('data-key')] = inp.value;
          render();
          // restore focus for continued typing
          var again = wrap.querySelector('input[data-key="'+inp.getAttribute('data-key')+'"]');
          if(again){ again.focus(); }
        });
      });
    }

    document.getElementById('scAddCriteria').addEventListener('click', function(){
      var name = document.getElementById('scCriteriaName').value.trim();
      var max = Number(document.getElementById('scCriteriaMax').value) || 10;
      if(!name){ setStatus(status,'សូមបញ្ចូលឈ្មោះលក្ខណវិនិច្ឆ័យ / Enter a criteria name.','err'); return; }
      criteria.push({name:name, max:max});
      document.getElementById('scCriteriaName').value = '';
      render();
    });

    document.getElementById('scAddParticipant').addEventListener('click', function(){
      var name = document.getElementById('scParticipantName').value.trim();
      if(!name){ setStatus(status,'សូមបញ្ចូលឈ្មោះអ្នកចូលរួម / Enter a participant name.','err'); return; }
      participants.push(name);
      document.getElementById('scParticipantName').value = '';
      render();
    });

    document.getElementById('scExportPdf').addEventListener('click', function(){
      if(!criteria.length || !participants.length){
        setStatus(status,'តារាងទទេ / Table is empty.','err'); return;
      }
      var jsPDFCtor = window.jspdf ? window.jspdf.jsPDF : null;
      if(!jsPDFCtor){ setStatus(status,'PDF library not available.','err'); return; }
      var doc = new jsPDFCtor({unit:'pt', format:'a4'});
      var startX = 40, startY = 60, rowH = 24;
      var colW = Math.max(70, (515 - 160) / participants.length);
      doc.setFontSize(14);
      doc.text('Score Card', startX, 40);
      doc.setFontSize(9);
      var x = startX;
      doc.text('Criteria', x, startY); x += 160;
      participants.forEach(function(p){ doc.text(String(p).substring(0,14), x, startY); x += colW; });
      doc.line(startX, startY+6, startX+160+colW*participants.length-colW+colW, startY+6);
      var y = startY + rowH;
      criteria.forEach(function(c, ci){
        x = startX;
        doc.text(c.name+' (/'+c.max+')', x, y); x += 160;
        participants.forEach(function(p, pi){
          var val = scores[ci+'-'+pi] || 0;
          doc.text(String(val), x, y); x += colW;
        });
        y += rowH;
      });
      x = startX;
      doc.setFont(undefined, 'bold');
      doc.text('Total', x, y); x += 160;
      participants.forEach(function(p, pi){
        var total = 0;
        criteria.forEach(function(c, ci){ total += Number(scores[ci+'-'+pi]) || 0; });
        doc.text(String(total), x, y); x += colW;
      });
      doc.save('score-card.pdf');
      setStatus(status,'ជោគជ័យ! PDF ត្រូវបានទាញយក / Done — PDF downloaded.','ok');
    });

    render();
  };

  /* ================= 7. Script ================= */
  function tplScript(){
    return ''+
    '<textarea id="scriptText" placeholder="សរសេរស្គ្រីប ឬកំណត់ចំណាំនៅទីនេះ... / Write your script or notes here..." style="min-height:220px;"></textarea>'+
    '<div class="field-row" style="margin-top:14px;">'+
      '<button class="btn gold" id="scriptWordBtn">ទាញយកជា Word / Save as Word</button>'+
      '<button class="btn ghost" id="scriptPdfBtn">ទាញយកជា PDF / Save as PDF</button>'+
      '<button class="btn ghost" id="scriptTxtBtn">ទាញយកជា .txt / Save as Text</button>'+
      '<button class="btn ghost" id="scriptClearBtn">សម្អាត / Clear</button>'+
    '</div>'+
    '<div class="status" id="scriptStatus"></div>';
  }
  TOOL_INIT["script"] = function(){
    var textarea = document.getElementById('scriptText');
    var status = document.getElementById('scriptStatus');

    document.getElementById('scriptWordBtn').addEventListener('click', function(){
      if(!textarea.value.trim()){ setStatus(status,'អត្ថបទទទេ / Text is empty.','err'); return; }
      var html = '<p>'+textarea.value.split('\n').join('</p><p>')+'</p>';
      var fullHtml = wordHtmlShell(html, 'Script');
      var blob = new Blob(['\ufeff', fullHtml], {type:'application/msword'});
      downloadBlob(blob, 'script.doc');
      setStatus(status,'ជោគជ័យ! / Done.','ok');
    });

    document.getElementById('scriptPdfBtn').addEventListener('click', function(){
      if(!textarea.value.trim()){ setStatus(status,'អត្ថបទទទេ / Text is empty.','err'); return; }
      var jsPDFCtor = window.jspdf ? window.jspdf.jsPDF : null;
      if(!jsPDFCtor){ setStatus(status,'PDF library not available.','err'); return; }
      var doc = new jsPDFCtor({unit:'pt', format:'a4'});
      var lines = doc.splitTextToSize(textarea.value, 515);
      doc.setFontSize(12);
      doc.text(lines, 40, 50);
      doc.save('script.pdf');
      setStatus(status,'ជោគជ័យ! / Done.','ok');
    });

    document.getElementById('scriptTxtBtn').addEventListener('click', function(){
      if(!textarea.value.trim()){ setStatus(status,'អត្ថបទទទេ / Text is empty.','err'); return; }
      var blob = new Blob([textarea.value], {type:'text/plain'});
      downloadBlob(blob, 'script.txt');
    });

    document.getElementById('scriptClearBtn').addEventListener('click', function(){
      textarea.value = '';
      setStatus(status,'','');
    });
  };

})();
</script>
